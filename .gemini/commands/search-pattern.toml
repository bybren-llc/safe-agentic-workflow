description = "Search for code patterns across codebase"

prompt = """
# Search Pattern Command

Search codebase for patterns using optimized tools. Useful for refactoring, finding usage, or understanding patterns.

**Pattern**: {{args}}

## Usage

```bash
/search-pattern "prisma\." ts     # Find direct Prisma usage in TypeScript
/search-pattern "withUserContext" # Find RLS context usage
/search-pattern "import.*icons"   # Find icon imports
```

## Search Workflow

### 1. Parse Arguments

- First argument = Pattern to search (required)
- Second argument = File type filter (optional: ts, tsx, js, md, etc.)

### 2. Execute Search

Search for the pattern:

```bash
!{grep -r "{{args}}" --include="*.ts" --include="*.tsx" . 2>/dev/null | head -50 || echo "No matches found"}
```

### 3. Analyze Results

Report:
- Total matches found
- Files affected
- Common patterns noticed
- Potential refactoring opportunities

### 4. Categorize Findings

Group by:
- **Usage patterns**: How pattern is used
- **Contexts**: Where pattern appears
- **Variations**: Different uses of pattern
- **Outliers**: Unusual usage

## Common Search Patterns

### Find Direct Database Access
```bash
/search-pattern "prisma\.(user|payment|subscription)"
```
Identifies: Direct Prisma calls that should use RLS context helpers

### Find Icon Library Usage
```bash
/search-pattern "from.*react-icons"
```
Identifies: Which icon libraries are used where

### Find TODO Comments
```bash
/search-pattern "TODO:|FIXME:|HACK:"
```
Identifies: Technical debt markers

### Find Deprecated Patterns
```bash
/search-pattern "deprecated|@deprecated"
```
Identifies: Code marked for removal

### Find Error Handling
```bash
/search-pattern "try\s*\{|catch\s*\("
```
Identifies: Error handling patterns

### Find Environment Variables
```bash
/search-pattern "process\.env\."
```
Identifies: All environment variable usage

### Find API Routes
```bash
/search-pattern "export.*GET|POST|PUT|DELETE"
```
Identifies: All API endpoints

### Find Test Files
```bash
/search-pattern "describe\(|it\(|test\("
```
Identifies: Test coverage

## Output Format

### Summary
```text
Pattern: {search-pattern}
Files: {count} files
Matches: {count} occurrences
```

### Grouped Results
```text
Category: {category-name}
- file1:line - context
- file2:line - context

Category: {category-name}
- file3:line - context
```

### Recommendations

Based on findings:
- Refactoring opportunities
- Pattern consistency issues
- Missing patterns
- Best practice violations

## Use Cases

### 1. Pre-Refactoring
Before refactoring, find all usage to create checklist of files to update.

### 2. Pattern Enforcement
Verify pattern usage (e.g., RLS patterns followed).

### 3. Dependency Analysis
Find imports to understand module dependencies.

### 4. Migration Tracking
Find old patterns to track migration to new patterns.

### 5. Documentation
Find undocumented code and cross-reference with documentation.

## Success Criteria

- Pattern found and categorized
- Usage context understood
- Refactoring opportunities identified
- Actionable insights provided
"""
