# =============================================================================
# HARNESS_CHANGELOG.yml -- Machine-Readable Changelog for SAFe Agentic Workflow
# =============================================================================
#
# PURPOSE:
#   Tracks all changes to the .claude/ harness directory between releases.
#   Consumed by sync-claude-harness.sh for automated categorization and by
#   downstream fork maintainers for upgrade planning.
#
# SCOPE:
#   v2.7.0+: .claude/ files only
#   Future versions may expand to include patterns_library/, dark-factory/, etc.
#
# SCHEMA VERSION: 1.0.0
#
# -----------------------------------------------------------------------------
# SCHEMA REFERENCE
# -----------------------------------------------------------------------------
#
# Top-level keys:
#   schema_version   (string, required) -- Semver of this schema format
#   generated_at     (string, required) -- ISO 8601 timestamp of last generation
#   releases         (list,   required) -- Ordered list of release entries (newest first)
#
# Release entry:
#   version          (string, required) -- Semver release tag (e.g., "2.7.0")
#   date             (string, required) -- Release date in YYYY-MM-DD format
#   summary          (string, required) -- One-line human-readable summary
#   upgrade_doc      (string, optional) -- Relative path to upgrade guide
#   changes          (list,   required) -- List of individual file change entries
#   migration_notes  (list,   optional) -- Free-form notes for breaking changes
#
# Change entry:
#   path             (string, required) -- Relative file path from repo root
#   category         (enum,   required) -- One of the categories below
#   change_type      (enum,   required) -- "added", "modified", "renamed", "deleted"
#   description      (string, required) -- What changed and why
#   breaking         (bool,   required) -- Whether this change can break downstream forks
#   renamed_from     (string, optional) -- Previous path, required when change_type is "renamed"
#   config_keys      (list,   optional) -- For CONFIG category: list of key path entries
#   migration_action (string, optional) -- For breaking changes: what the fork maintainer must do
#
# Categories (enum):
#   NEW_FILE         -- File added since last release. Safe to copy for forks.
#   UPDATED_FILE     -- Existing file modified. Diff review needed by forks.
#   METHODOLOGY      -- Changes to agent roles, skills, SOPs. Affects workflow.
#   BREAKING         -- Renames, deletions, structural changes. Requires fork adaptation.
#   CONFIG           -- Changes to JSON config files. Specific key paths documented.
#
# Config key entry (used in config_keys):
#   key_path         (string, required) -- Dot-notation path (e.g., "agents.dpe.primary_tools")
#   action           (enum,   required) -- "added", "changed", "removed"
#   description      (string, required) -- What the key controls and why it changed
#
# -----------------------------------------------------------------------------
# FILE CLASSIFICATION HEURISTIC
# -----------------------------------------------------------------------------
#
# Use this mapping to determine the correct category for each file:
#
#   .claude/agents/*.md                        -> METHODOLOGY
#   .claude/skills/*/SKILL.md                  -> METHODOLOGY
#   .claude/commands/*.md (new file)           -> NEW_FILE
#   .claude/commands/*.md (existing, modified) -> UPDATED_FILE
#   .claude/*.json (team-config, hooks-config, settings) -> CONFIG
#   .claude/*.md (README, SETUP, TROUBLESHOOTING, AGENT_OUTPUT_GUIDE) -> UPDATED_FILE
#   .claude/hooks/*                            -> CONFIG
#
# Override rules:
#   - Any file that is renamed or deleted is always BREAKING regardless of heuristic.
#   - A new agent or skill file is METHODOLOGY + NEW_FILE; use METHODOLOGY as primary.
#   - If a CONFIG change also alters agent behavior, list it as CONFIG with a note
#     in description referencing the methodology impact.
#
# -----------------------------------------------------------------------------
# CHANGELOG ENTRIES
# -----------------------------------------------------------------------------

