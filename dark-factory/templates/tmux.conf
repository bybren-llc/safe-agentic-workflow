# Dark Factory tmux configuration
# Optimized for AI agent sessions with long-running output

# Use 256 colors
set -g default-terminal "screen-256color"

# Increase scrollback buffer (agents produce lots of output)
set -g history-limit 50000

# Enable mouse support (for Cursor SSH terminal interaction)
set -g mouse on

# Status bar showing session info
set -g status on
set -g status-interval 5
set -g status-left '#[fg=green]#S #[fg=white]| '
set -g status-right '#[fg=yellow]%H:%M #[fg=white]| #[fg=cyan]#(whoami)@#H'
set -g status-left-length 30

# Pane borders with agent role names
set -g pane-border-status top
set -g pane-border-format ' #{pane_title} '
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=green

# Don't auto-rename windows (we set titles to agent roles)
set -g allow-rename off
setw -g automatic-rename off

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Start window/pane numbering at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Quick pane switching with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Prefix + L to show all pane logs
bind L display-popup -E "tail -f ~/.dark-factory/logs/$(tmux display-message -p '#S')/*.log"
